<div class="auth-wrapper">

  <div class="auth-card">

    <h1>Create Account</h1>

    <form (ngSubmit)="signup()">

      <input
        type="text"
        placeholder="Username"
        [(ngModel)]="username"
        name="username"
      >

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
      >

      <button type="submit">
        Create Account
      </button>

    </form>

    <p class="bottom-text">
      Already have an account?

      <a routerLink="/login">
        Login
      </a>

    </p>

  </div>

</div>
